<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Apple Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  background:#FAF8F0;
  overflow:hidden;
  touch-action:none;
  font-family:'Segoe UI',sans-serif;
  user-select:none;
  -webkit-user-select:none;
}
body{
  display:flex;flex-direction:column;align-items:center;
}
#header{
  width:100%;max-width:420px;
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px 6px;
  flex-shrink:0;
}
.hbox{
  background:#fff;
  border:1.5px solid #e0d8c8;
  border-radius:10px;
  padding:4px 12px;
  text-align:center;
  min-width:74px;
}
.hlabel{font-size:9px;color:#bbb;letter-spacing:1px;margin-bottom:1px;}
.hval{font-size:20px;font-weight:700;color:#444;line-height:1.1;}
#next-wrap{
  background:#fff;
  border:1.5px solid #e0d8c8;
  border-radius:10px;
  padding:4px 10px;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
}
#next-label{font-size:9px;color:#bbb;letter-spacing:1px;margin-bottom:3px;}
#next-canvas{display:block;}
#canvas-wrap{
  flex:1;
  width:100%;max-width:420px;
  display:flex;align-items:flex-start;justify-content:center;
  padding-bottom:4px;
  overflow:hidden;
}
#gc{
  display:block;
  background:#FFFFF0;
  border:2px solid #d4c9b0;
  border-radius:0 0 14px 14px;
  touch-action:none;
  cursor:crosshair;
}
#ov{
  display:none;position:absolute;
  top:0;left:0;width:100%;height:100%;
  background:rgba(250,248,240,0.93);
  border-radius:0 0 14px 14px;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:20;
}
#ov.show{display:flex;}
#ov h2{font-size:32px;color:#c0392b;margin-bottom:6px;}
#ov p{font-size:18px;color:#666;margin-bottom:22px;}
#rbtn{
  background:#d4927a;color:#fff;border:none;
  border-radius:26px;padding:12px 38px;
  font-size:17px;font-weight:700;cursor:pointer;
}
#rbtn:active{background:#b97055;}
</style>
</head>
<body>

<div id="header">
  <div class="hbox">
    <div class="hlabel">BEST</div>
    <div class="hval" id="best">0</div>
  </div>
  <div id="next-wrap">
    <div id="next-label">NEXT</div>
    <canvas id="next-canvas" width="52" height="52"></canvas>
  </div>
  <div class="hbox">
    <div class="hlabel">SCORE</div>
    <div class="hval" id="score">0</div>
  </div>
</div>

<div id="canvas-wrap">
  <div style="position:relative;" id="rel-wrap">
    <canvas id="gc"></canvas>
    <div id="ov">
      <h2>GAME OVER</h2>
      <p id="fscore"></p>
      <button id="rbtn" onclick="restartGame()">다시 하기</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

/* ────── 캔버스 & 물리 로직 픽셀 ────── */
const LW = 380, LH = 540;   // 논리 픽셀 (물리 엔진 기준)
const WALL_T = 22;
const DANGER_Y = 60;

/* ────── DOM ────── */
const canvas   = document.getElementById('gc');
const ctx      = canvas.getContext('2d');
const nxtCv    = document.getElementById('next-canvas');
const nxtCtx   = nxtCv.getContext('2d');
const relWrap  = document.getElementById('rel-wrap');

canvas.width = LW; canvas.height = LH;

function scaleCanvas(){
  const hh = document.getElementById('header').getBoundingClientRect().height;
  const avW = Math.min(window.innerWidth, 420);
  const avH = window.innerHeight - hh - 6;
  const sc  = Math.min(avW/LW, avH/LH);
  const cw  = Math.floor(LW*sc);
  const ch  = Math.floor(LH*sc);
  canvas.style.width  = cw+'px';
  canvas.style.height = ch+'px';
  relWrap.style.width  = cw+'px';
  relWrap.style.height = ch+'px';
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

/* ────── 상태 ────── */
let engine, world, runner, rafId;
let bodies    = [];
let merging   = new Set();
let dangerCnt = new Map();   // bodyId → 연속 정착 프레임 수
let score     = 0;
let best      = +(localStorage.getItem('ag_best')||0);
let gameActive= false;
let maxUnlocked = 0;
let curLv, nxtLv;
let dropX  = LW/2;
let canDrop= true;
let lastDropTime = 0;

/* ────── 게임 시작/재시작 ────── */
function restartGame(){
  if(runner) Runner.stop(runner);
  if(engine) Engine.clear(engine);
  if(rafId)  cancelAnimationFrame(rafId);

  bodies=[]; merging.clear(); dangerCnt.clear();
  score=0; gameActive=false; maxUnlocked=0;
  canDrop=true; dropX=LW/2; lastDropTime=0;

  document.getElementById('score').textContent='0';
  document.getElementById('best').textContent=best;
  document.getElementById('ov').classList.remove('show');

  const {Engine:E,Bodies:B,Body,World:W,Events,Runner:R}=Matter;

  engine = E.create({gravity:{y:1.5}});
  world  = engine.world;

  const wo={isStatic:true,friction:0.3,restitution:0.1,label:'wall'};
  W.add(world,[
    B.rectangle(LW/2, LH+WALL_T/2,   LW+WALL_T*2, WALL_T, wo),
    B.rectangle(-WALL_T/2, LH/2,      WALL_T, LH*3,     wo),
    B.rectangle(LW+WALL_T/2, LH/2,    WALL_T, LH*3,     wo),
  ]);

  Events.on(engine,'collisionStart',onCollision);

  runner = R.create();
  R.run(runner, engine);

  curLv=0; nxtLv=0;
  drawNext();
  gameActive=true;
  rafId=requestAnimationFrame(loop);
}

/* ────── 레벨 랜덤 선택 ────── */
function pickLv(){
  return Math.floor(Math.random()*Math.min(4, maxUnlocked+1));
}

/* ────── 원 추가 ────── */
function addBody(x, y, lv){
  const r = RADII[lv];
  const cx = Math.max(r+WALL_T+1, Math.min(LW-r-WALL_T-1, x));
  const b = Matter.Bodies.circle(cx, y, r,{
    restitution:0.2, friction:0.5, frictionAir:0.01, density:0.002, label:'circle'
  });
  b.gameLevel = lv;
  b.isNew = true;
  b.spawnTime = performance.now();
  setTimeout(()=>{ b.isNew=false; }, 450);
  Matter.World.add(world, b);
  bodies.push(b);
  return b;
}

/* ────── 충돌 → 합체 ────── */
function onCollision(e){
  e.pairs.forEach(({bodyA,bodyB})=>{
    if(bodyA.label!=='circle'||bodyB.label!=='circle') return;
    if(bodyA.gameLevel!==bodyB.gameLevel) return;
    if(bodyA.gameLevel>=MAX_LV) return;
    if(merging.has(bodyA.id)||merging.has(bodyB.id)) return;
    if(bodyA.isNew||bodyB.isNew) return;

    merging.add(bodyA.id); merging.add(bodyB.id);
    const mx=(bodyA.position.x+bodyB.position.x)/2;
    const my=(bodyA.position.y+bodyB.position.y)/2;
    const nl=bodyA.gameLevel+1;
    const idA=bodyA.id, idB=bodyB.id;

    setTimeout(()=>{
      const oa=bodies.find(b=>b.id===idA);
      const ob=bodies.find(b=>b.id===idB);
      if(oa){ Matter.World.remove(world,oa); dangerCnt.delete(oa.id); bodies=bodies.filter(b=>b!==oa); }
      if(ob){ Matter.World.remove(world,ob); dangerCnt.delete(ob.id); bodies=bodies.filter(b=>b!==ob); }

      const nb=addBody(mx,my,nl);
      nb.isNew=false;
      nb.flash=performance.now()+280;
      Matter.Body.setVelocity(nb,{x:0,y:-3});
      merging.delete(idA); merging.delete(idB);

      score += SCORE_TB[nl];
      if(score>best){ best=score; localStorage.setItem('ag_best',best); }
      document.getElementById('score').textContent=score;
      document.getElementById('best').textContent=best;
      maxUnlocked=Math.max(maxUnlocked,nl);
    },40);
  });
}

/* ────── 게임오버 체크 (레퍼런스 코드 방식) ────── */
function checkGameOver(){
  if(!gameActive) return;
  const now=performance.now();
  if(now-lastDropTime<DROP_COOL) return;

  for(const b of bodies){
    if(merging.has(b.id)){ dangerCnt.delete(b.id); continue; }
    if(b.isNew){ dangerCnt.delete(b.id); continue; }
    const top = b.position.y - RADII[b.gameLevel];
    const vx  = Math.abs(b.velocity.x);
    const vy  = Math.abs(b.velocity.y);
    const settled = vx<SETTLE_V && vy<SETTLE_V;
    if(top<DANGER_Y && settled){
      dangerCnt.set(b.id,(dangerCnt.get(b.id)||0)+1);
      if(dangerCnt.get(b.id)>=SETTLE_F){
        triggerGameOver(); return;
      }
    } else {
      dangerCnt.delete(b.id);
    }
  }
}

function triggerGameOver(){
  if(!gameActive) return;
  gameActive=false;
  document.getElementById('fscore').textContent='점수: '+score;
  document.getElementById('ov').classList.add('show');
}

/* ────── 원 그리기 ────── */
function drawCircle(c,x,y,r,lv,flash){
  const zoom=ZOOM[lv], d=r*2*zoom;
  c.save();
  c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.clip();
  c.drawImage(imgs[lv], x-d/2, y-d/2, d, d);
  if(flash){ c.fillStyle='rgba(255,255,255,0.5)'; c.fillRect(x-r,y-r,r*2,r*2); }
  c.restore();
  c.beginPath(); c.arc(x,y,r,0,Math.PI*2);
  c.strokeStyle=flash?'rgba(255,210,60,0.9)':'rgba(0,0,0,0.12)';
  c.lineWidth=flash?3:1.5; c.stroke();
}

/* ────── NEXT 미리보기 ────── */
function drawNext(){
  nxtCtx.clearRect(0,0,52,52);
  const r=Math.min(RADII[nxtLv],24);
  drawCircle(nxtCtx,26,26,r,nxtLv,false);
}

/* ────── 메인 루프 ────── */
function loop(ts){
  if(!gameActive) return;
  checkGameOver();

  ctx.fillStyle='#FFFFF0';
  ctx.fillRect(0,0,LW,LH);

  // 위험선
  ctx.setLineDash([7,5]);
  ctx.strokeStyle='rgba(200,180,150,0.55)';
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,DANGER_Y); ctx.lineTo(LW,DANGER_Y); ctx.stroke();
  ctx.setLineDash([]);

  const now=performance.now();

  // 드롭 프리뷰
  if(canDrop){
    ctx.save(); ctx.globalAlpha=0.38;
    drawCircle(ctx,dropX,DANGER_Y,RADII[curLv],curLv,false);
    ctx.restore();
    ctx.setLineDash([4,6]);
    ctx.strokeStyle='rgba(160,150,130,0.35)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(dropX,DANGER_Y+RADII[curLv]);
    ctx.lineTo(dropX,LH);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 모든 원
  for(const b of bodies){
    const {x,y}=b.position, r=RADII[b.gameLevel];
    const fl=b.flash&&now<b.flash;
    ctx.save(); ctx.translate(x,y); ctx.rotate(b.angle);
    drawCircle(ctx,0,0,r,b.gameLevel,fl);
    ctx.restore();
  }

  rafId=requestAnimationFrame(loop);
}

/* ────── 입력 처리 ────── */
function getX(e){
  const rect=canvas.getBoundingClientRect();
  const scX=LW/rect.width;
  // touchend는 changedTouches 사용 (touches는 비어있음)
  const src = (e.touches&&e.touches.length>0) ? e.touches[0]
            : (e.changedTouches&&e.changedTouches.length>0) ? e.changedTouches[0]
            : e;
  return (src.clientX-rect.left)*scX;
}

function onMove(e){
  if(!gameActive||!canDrop) return;
  e.preventDefault();
  const x=getX(e);
  dropX=Math.max(RADII[curLv]+WALL_T+1, Math.min(LW-RADII[curLv]-WALL_T-1, x));
}

function onDrop(e){
  if(!gameActive||!canDrop) return;
  e.preventDefault();
  const x=getX(e);
  dropX=Math.max(RADII[curLv]+WALL_T+1, Math.min(LW-RADII[curLv]-WALL_T-1, x));
  canDrop=false;
  addBody(dropX,DANGER_Y,curLv);
  lastDropTime=performance.now();
  curLv=nxtLv; nxtLv=pickLv(); drawNext();
  setTimeout(()=>{ canDrop=true; }, 480);
}

canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mousedown', onDrop);
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend',  onDrop, {passive:false});

/* ────── 시작 ────── */
restartGame();
</script>
